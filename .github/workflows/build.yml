name: Build

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: build-${{ github.event.workflow_run.head_branch || 'main' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build plugin ZIP
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          # Full history required so we can push the commit back
          fetch-depth: 0

      - name: Set up PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, intl, json
          coverage: none

      - name: Run build script
        run: bash bin/build.sh

      - name: Verify ZIP in dist/
        run: |
          # Remove any previously committed ZIPs so old versions don't accumulate
          # The build script already outputs the ZIP directly into dist/
          ls dist/*.zip

      - name: Commit ZIP to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          # Only commit if there is something new to commit
          if git diff --cached --quiet; then
            echo "No changes to the ZIP – skipping commit."
          else
            git commit -m "Build: update plugin ZIP [skip actions]"
            git push
          fi
